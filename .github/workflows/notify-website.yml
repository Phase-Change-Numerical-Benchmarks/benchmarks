name: Notify website

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: Phase-Change-Numerical-Benchmarks/phase-change-numerical-benchmarks.github.io
          event-type: benchmarks-updated
